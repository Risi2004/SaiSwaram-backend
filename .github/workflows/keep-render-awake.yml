name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "Missing secret: RENDER_HEALTHCHECK_URL"
            exit 1
          fi
          curl --fail --silent --show-error --max-time 20 "$HEALTHCHECK_URL"
